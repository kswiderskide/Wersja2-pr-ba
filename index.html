<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Kierowcy</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; padding: 20px; margin: 0; }
        .card { background: #262626; padding: 20px; border-radius: 8px; }
        select, button { width: 100%; padding: 15px; margin: 5px 0; font-size: 16px; border-radius: 5px; border: none; }
        button { background: #ccff33; color: #000; font-weight: bold; cursor: pointer; }
        #table-output { margin-top: 20px; }
        table { width: 100%; color: white; border-collapse: collapse; }
        td { padding: 10px; border-bottom: 1px solid #444; }
    </style>
</head>
<body>

<div class="card">
    <h2>PORTAL KIEROWCY</h2>
    <select id="routeSelect" onchange="updateHours()">
        <option value="">Wybierz trasę...</option>
    </select>
    <select id="hourSelect">
        <option value="">Wybierz godzinę...</option>
    </select>
    <button onclick="showSchedule()">POKAŻ HARMONOGRAM</button>
</div>

<div id="table-output"></div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwy10Lf3qFb4ebHe-bEVQCcJ4ZYSUHbs4FfZ4XSfcvDckqh8aXH88gK62HX-fIVxliw/exec"; // Wklej link z Wdrożenia
    let fullDb = [];

    async function init() {
        const res = await fetch(API_URL + "?action=getData");
        fullDb = await res.json();
        const routes = [...new Set(fullDb.slice(1).map(r => r[0]))];
        const rSel = document.getElementById('routeSelect');
        routes.forEach(r => rSel.add(new Option(r, r)));
    }

    function updateHours() {
        const route = document.getElementById('routeSelect').value;
        const hours = [...new Set(fullDb.slice(1).filter(r => r[0] === route).map(r => r[1]))];
        const hSel = document.getElementById('hourSelect');
        hSel.innerHTML = '<option value="">Wybierz godzinę...</option>';
        hours.forEach(h => hSel.add(new Option(h, h)));
    }

    function showSchedule() {
        const route = document.getElementById('routeSelect').value;
        const hour = document.getElementById('hourSelect').value;
        if (!route || !hour) return alert("Wybierz trasę i godzinę!");

        const filtered = fullDb.filter(r => r[0] === route && r[1] === hour);
        let html = '<table>';
        filtered.forEach(row => {
            html += `<tr><td>${row[2]}</td><td>${row[3]}</td></tr>`;
        });
        document.getElementById('table-output').innerHTML = html + '</table>';
    }

    init();
</script>
</body>
</html>
