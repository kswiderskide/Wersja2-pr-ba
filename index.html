<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Kierowcy</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; margin: 0; padding: 20px; }
        .card { background: #262626; padding: 20px; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        td { padding: 12px; border-bottom: 1px solid #444; }
        .btn { background: #ccff33; color: black; padding: 10px; border: none; cursor: pointer; font-weight: bold; }
        #admin-panel { margin-top: 20px; border-top: 1px solid #555; padding-top: 20px; }
    </style>
</head>
<body>

<div class="card">
    <h2>PORTAL KIEROWCY</h2>
    <div id="data-container">Ładowanie tras...</div>

    <div id="admin-panel">
        <input type="password" id="admin-pass" placeholder="Hasło administratora">
        <button class="btn" onclick="checkAdmin()">WEJDŹ DO EDYCJI</button>
    </div>
</div>

<script>
    const API_URL = "TU_WKLEJ_SWOJ_URL_Z_GAS"; // <-- TUTAJ WKLEJ SWÓJ URL

    async function loadData() {
        try {
            const response = await fetch(API_URL + "?action=getData");
            const data = await response.json();
            renderTable(data);
        } catch (e) {
            document.getElementById('data-container').innerText = "Błąd połączenia z serwerem.";
        }
    }

    function renderTable(data) {
        let html = '<table>';
        data.forEach(row => {
            html += `<tr><td>${row[0]}</td><td>${row[1] || '--'}</td></tr>`;
        });
        html += '</table>';
        document.getElementById('data-container').innerHTML = html;
    }

    async function checkAdmin() {
        const pass = document.getElementById('admin-pass').value;
        const response = await fetch(API_URL + "?action=checkPassword&pass=" + encodeURIComponent(pass));
        const result = await response.json();
        
        if (result.success) {
            alert("Hasło poprawne! Przekierowuję...");
            window.open('https://script.google.com/macros/s/TWÓJ_LINK_DO_EDYCJI/exec', '_blank');
        } else {
            alert("Błędne hasło!");
        }
    }

    loadData();
</script>
</body>
</html>
