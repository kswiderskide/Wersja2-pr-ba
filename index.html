<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Kierowcy</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --accent-color: #ccff33;
            --text-color: #ffffff;
            --text-muted: #aaaaaa;
            --border-color: #333333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        /* NAGŁÓWEK APLIKACJI */
        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #262626;
            padding: 12px 15px;
            border-bottom: 2px solid var(--border-color);
            position: relative;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        .header-left, .header-right {
            flex: 1;
            display: flex;
            align-items: center;
        }

        .header-right {
            justify-content: flex-end;
        }

        .header-center {
            flex: 2;
            text-align: center;
        }

        .header-center h1 {
            color: var(--text-color);
            font-size: 1.3rem;
            margin: 0;
            letter-spacing: 2px;
            font-weight: bold;
            text-transform: uppercase;
        }

        /* Przyciski nagłówka */
        .header-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            border-radius: 4px;
            transition: all 0.3s ease;
        }

        .header-btn i {
            font-size: 1.3rem;
            transition: transform 0.2s ease;
        }

        /* Aktywna żarówka z poświatą */
        .header-btn.active {
            color: var(--accent-color);
        }

        .header-btn.active #bulbIcon {
            font-weight: 900;
            filter: drop-shadow(0 0 5px var(--accent-color)) drop-shadow(0 0 10px var(--accent-color));
        }

        #wakeLockStatus {
            font-size: 0.75rem;
            font-weight: bold;
            font-family: 'Courier New', Courier, monospace;
            letter-spacing: 1px;
        }

        /* Struktura główna */
        .container {
            padding: 15px;
            max-width: 800px;
            margin: 0 auto;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid var(--border-color);
        }

        /* UKŁAD PIONOWY - OKNA POD SOBĄ */
        .filters-container {
            display: flex;
            flex-direction: column; /* Wymuszenie układu jeden pod drugim */
            gap: 15px;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .filter-group label {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .filter-group select {
            background-color: #262626;
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 14px; /* Większy, wygodniejszy margines do klikania na tablecie */
            font-size: 1.1rem;
            border-radius: 6px;
            outline: none;
            cursor: pointer;
            width: 100%;
            box-sizing: border-box;
        }

        .filter-group select:focus {
            border-color: var(--accent-color);
        }

        .route-title {
            color: var(--accent-color);
            font-size: 1.4rem;
            margin-top: 0;
            margin-bottom: 10px;
            text-transform: uppercase;
            font-weight: bold;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px 10px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
            font-size: 1.1rem;
        }

        th {
            color: var(--text-muted);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Statusy przystanków */
        .current-stop {
            background-color: rgba(204, 255, 51, 0.15);
            color: var(--accent-color);
            font-weight: bold;
        }

        .next-stop {
            color: #ffffff;
        }

        .passed-stop {
            color: #555555;
            text-decoration: line-through;
        }

        .time-col {
            width: 70px;
            font-family: monospace;
            font-size: 1.2rem;
        }

        /* Panel edycji (Zębatka) */
        .admin-panel {
            display: none;
            background-color: var(--card-bg);
            border: 2px dashed var(--accent-color);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .admin-panel.open {
            display: block;
        }

        .admin-panel iframe {
            width: 100%;
            height: 500px;
            border: none;
            background: #ffffff;
            border-radius: 4px;
        }

        #loading {
            text-align: center;
            color: var(--accent-color);
            font-size: 1.2rem;
            margin-top: 50px;
        }
    </style>
</head>
<body>

    <header class="app-header">
        <div class="header-left">
            <button id="wakeLockBtn" onclick="toggleWakeLock()" class="header-btn">
                <i class="far fa-lightbulb" id="bulbIcon"></i>
                <span id="wakeLockStatus">EKRAN: OFF</span>
            </button>
        </div>

        <div class="header-center">
            <h1>Portal Kierowcy</h1>
        </div>

        <div class="header-right">
            <button id="adminBtn" onclick="toggleEditMode()" class="header-btn">
                <i class="fas fa-cog"></i>
            </button>
        </div>
    </header>

    <div class="container">
        <section id="adminPanel" class="admin-panel">
            <h3 style="color: var(--accent-color); margin-top: 0; display: flex; justify-content: space-between; align-items: center;">
                <span>🛠️ Panel Edycji Rozkładów i Tras</span>
                <button onclick="toggleEditMode()" style="background: var(--accent-color); border: none; padding: 5px 10px; cursor: pointer; font-weight: bold; border-radius: 4px;">Zamknij</button>
            </h3>
            <iframe src="https://docs.google.com/spreadsheets/d/140lW_72CWe6yI_4pM8bE-HymD1bC-e7S83Oenq8lOtc/edit?usp=sharing"></iframe>
        </section>

        <div class="card filters-container">
            <div class="filter-group">
                <label for="routeSelect">Wybierz trasę:</label>
                <select id="routeSelect" onchange="updateTimeSelect()">
                    <option value="">-- Wybierz trasę --</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="timeSelect">Godzina rozpoczęcia:</label>
                <select id="timeSelect" onchange="filterData()">
                    <option value="">-- Wybierz godzinę --</option>
                </select>
            </div>
        </div>

        <div id="loading">Pobieranie aktualnego rozkładu jazdy...</div>
        <div id="rozklad-kontener"></div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwL9cS6_hCokdTYd9L2OiA6WdHywGvyOFVd-rgde6MGYeHgKRSLaHLn3iXYaGwVCf-C/exec"; 

        let wakeLock = null;
        let globalData = []; 

        // Funkcja żarówki (Wake Lock)
        async function toggleWakeLock() {
            const btn = document.getElementById('wakeLockBtn');
            const statusTxt = document.getElementById('wakeLockStatus');
            const bulbIcon = document.getElementById('bulbIcon');

            if (!wakeLock) {
                try {
                    wakeLock = await navigator.wakeLock.request('screen');
                    btn.classList.add('active');
                    statusTxt.innerText = 'EKRAN: ON';
                    bulbIcon.className = 'fas fa-lightbulb'; 
                    
                    wakeLock.addEventListener('release', () => {
                        wakeLock = null;
                        btn.classList.remove('active');
                        statusTxt.innerText = 'EKRAN: OFF';
                        bulbIcon.className = 'far fa-lightbulb';
                    });
                } catch (err) {
                    console.error(err);
                }
            } else {
                await wakeLock.release();
                wakeLock = null;
                btn.classList.remove('active');
                statusTxt.innerText = 'EKRAN: OFF';
                bulbIcon.className = 'far fa-lightbulb';
            }
        }

        // Funkcja zębatki
        function toggleEditMode() {
            const adminPanel = document.getElementById('adminPanel');
            adminPanel.classList.toggle('open');
            const cog = document.querySelector('#adminBtn i');
            cog.style.transform = adminPanel.classList.contains('open') ? 'rotate(90deg)' : 'rotate(0deg)';
        }

        // Pobieranie danych zgodne z Twoją strukturą tablicy w Google Sheets
        async function zaciagnijDane() {
            try {
                const response = await fetch(SCRIPT_URL);
                const data = await response.json();
                
                localStorage.setItem('cachedRozklad', JSON.stringify(data));
                globalData = data;
                initApp();
            } catch (error) {
                const cached = localStorage.getItem('cachedRozklad');
                if (cached) {
                    globalData = JSON.parse(cached);
                    initApp();
                } else {
                    document.getElementById('loading').innerText = "Brak połączenia.";
                }
            }
        }

        // Wypełnianie listy wyboru tras (wiersz[0] z Twojego arkusza)
        function initApp() {
            if(document.getElementById('loading')) document.getElementById('loading').style.display = 'none';

            const routeSelect = document.getElementById('routeSelect');
            const zapamietanaTrasa = routeSelect.value;

            // Wyciągamy unikalne trasy z indeksu 0 (pierwsza kolumna w arkuszu)
            const unikalneTrasy = [...new Set(globalData.map(wiersz => wiersz[0]))].filter(Boolean);
            
            routeSelect.innerHTML = '<option value="">-- Wybierz trasę --</option>';
            unikalneTrasy.forEach(trasa => {
                const option = document.createElement('option');
                option.value = trasa;
                option.innerText = trasa;
                routeSelect.appendChild(option);
            });

            if (zapamietanaTrasa && unikalneTrasy.includes(zapamietanaTrasa)) {
                routeSelect.value = zapamietanaTrasa;
                updateTimeSelect();
            } else {
                filterData();
            }
        }

        // Ładowanie godzin przypisanych do danej trasy (wiersz[2] z Twojego arkusza)
        function updateTimeSelect() {
            const selectedRoute = document.getElementById('routeSelect').value;
            const timeSelect = document.getElementById('timeSelect');

            if (!selectedRoute) {
                timeSelect.innerHTML = '<option value="">-- Wybierz godzinę --</option>';
                filterData();
                return;
            }

            // Filtrujemy wiersze dla wybranej trasy i pobieramy unikalne godziny rozpoczęcia kursu
            const wierszeTrasy = globalData.filter(wiersz => wiersz[0] === selectedRoute);
            const unikalneGodziny = [...new Set(wierszeTrasy.map(wiersz => wiersz[2]))].filter(Boolean).sort();

            timeSelect.innerHTML = '<option value="">-- Wybierz godzinę --</option>';
            unikalneGodziny.forEach(godz => {
                const option = document.createElement('option');
                option.value = godz;
                option.innerText = godz;
                timeSelect.appendChild(option);
            });

            filterData();
        }

        // Wyświetlanie przefiltrowanej tabeli dla kierowcy
        function filterData() {
            const selectedRoute = document.getElementById('routeSelect').value;
            const selectedTime = document.getElementById('timeSelect').value;
            const kontener = document.getElementById('rozklad-kontener');
            
            kontener.innerHTML = '';

            if (!selectedRoute) {
                kontener.innerHTML = '<div class="card" style="text-align:center; color: var(--text-muted);">Proszę wybrać trasę.</div>';
                return;
            }

            // Mapowanie i dopasowanie: wiersz[0] = Trasa, wiersz[2] = Godzina startu/kursu
            let przefiltrowane = globalData.filter(wiersz => wiersz[0] === selectedRoute);

            if (selectedTime) {
                przefiltrowane = przefiltrowane.filter(wiersz => wiersz[2] === selectedTime);
            }

            if (przefiltrowane.length === 0) {
                kontener.innerHTML = '<div class="card">Brak danych dla wybranych filtrów.</div>';
                return;
            }

            const card = document.createElement('div');
            card.className = 'card';

            const title = document.createElement('h2');
            title.className = 'route-title';
            title.innerText = selectedRoute;
            card.appendChild(title);

            const table = document.createElement('table');
            table.innerHTML = `
                <thead>
                    <tr>
                        <th class="time-col">Godz.</th>
                        <th>Przystanek</th>
                    </tr>
                </thead>
            `;
            
            const tbody = document.createElement('tbody');
            const teraz = new Date();
            const aktualneMinuty = teraz.getHours() * 60 + voterMin = teraz.getMinutes();
            let znalezionoBiezacy = false;

            // Sortowanie po godzinie (wiersz[2])
            przefiltrowane.sort((a, b) => a[2].localeCompare(b[2]));

            przefiltrowane.forEach((wiersz) => {
                const tr = document.createElement('tr');
                const godzinaWpisu = wiersz[2]; // Godzina z arkusza
                const przystanekNazwa = wiersz[1]; // Przystanek z arkusza

                const [godz, min] = godzinaWpisu.split(':').map(Number);
                const minutRozkladu = godz * 60 + min;
                const aktualneMinutySystemu = teraz.getHours() * 60 + teraz.getMinutes();

                let stanKlasa = 'next-stop';
                if (minutRozkladu < aktualneMinutySystemu) {
                    stanKlasa = 'passed-stop';
                } else if (!znalezionoBiezacy && minutRozkladu >= aktualneMinutySystemu) {
                    stanKlasa = 'current-stop';
                    znalezionoBiezacy = true;
                }

                tr.className = stanKlasa;
                tr.innerHTML = `
                    <td class="time-col">${godzinaWpisu}</td>
                    <td>${przystanekNazwa}</td>
                `;
                tbody.appendChild(tr);
            });

            table.appendChild(tbody);
            card.appendChild(table);
            kontener.appendChild(card);
        }

        zaciagnijDane();
        setInterval(filterData, 30000);
    </script>
</body>
</html>
