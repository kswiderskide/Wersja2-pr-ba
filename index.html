<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal Kierowcy</title>
  <style>
    :root {
      --bg-color: #121212;
      --card-bg: #1e1e1e;
      --accent: #00ffcc;
      --text: #ffffff;
      --text-muted: #aaaaaa;
    }
    body {
      background-color: var(--bg-color);
      color: var(--text);
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 15px;
    }
    /* Wyśrodkowany nagłówek z ikonami */
    .header-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 500px;
      margin: 0 auto 20px auto;
    }
    h1 {
      font-size: 20px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--accent);
      margin: 0;
      text-align: center;
      flex-grow: 1;
    }
    .icon-btn {
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      padding: 5px;
    }
    .wake-lock-on { color: var(--accent); }
    .wake-lock-off { color: var(--text-muted); }
    .gear-icon { color: var(--text-muted); }

    /* Formularze i filtry */
    .form-group {
      max-width: 500px;
      margin: 0 auto 15px auto;
    }
    label {
      display: block;
      margin-bottom: 5px;
      font-size: 14px;
      color: var(--text-muted);
    }
    select {
      width: 100%;
      padding: 12px;
      background-color: var(--card-bg);
      border: 1px solid #333;
      color: var(--text);
      border-radius: 6px;
      font-size: 16px;
    }
    .btn-submit {
      width: 100%;
      max-width: 500px;
      display: block;
      margin: 20px auto;
      padding: 14px;
      background-color: var(--accent);
      color: #000;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
    }
    .btn-submit:disabled {
      background-color: #333;
      color: #777;
      cursor: not-allowed;
    }

    /* Harmonogram jako karty */
    #schedule-container {
      max-width: 500px;
      margin: 20px auto;
    }
    .stop-card {
      background-color: var(--card-bg);
      border-left: 4px solid var(--accent);
      padding: 15px;
      margin-bottom: 10px;
      border-radius: 4px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .stop-info {
      display: flex;
      flex-direction: column;
    }
    .stop-name { font-size: 16px; font-weight: bold; }
    .stop-time { font-size: 14px; color: var(--accent); margin-top: 4px; }
    .map-link {
      background-color: #333;
      color: var(--accent);
      text-decoration: none;
      padding: 8px 12px;
      border-radius: 4px;
      font-size: 12px;
    }

    /* Okienko hasła */
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.8);
      justify-content: center;
      align-items: center;
    }
    .modal-content {
      background: var(--card-bg);
      padding: 20px;
      border-radius: 8px;
      text-align: center;
      width: 80%;
      max-width: 300px;
    }
    .modal input {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
      background: #000;
      color: #fff;
      border: 1px solid #333;
    }
  </style>
</head>
<body>

  <div class="header-container">
    <button id="wakeLockBtn" class="icon-btn wake-lock-off" onclick="toggleWakeLock()">💡</button>
    <h1>Portal Kierowcy</h1>
    <button class="icon-btn gear-icon" onclick="openPasswordModal()">⚙️</button>
  </div>

  <div class="form-group">
    <label for="routeSelect">1. Wybierz trasę:</label>
    <select id="routeSelect" onchange="onRouteChanged()">
      <option value="">-- Ładowanie tras... --</option>
    </select>
  </div>

  <div class="form-group">
    <label for="hourSelect">2. Wybierz godzinę kursu:</label>
    <select id="hourSelect" disabled onchange="onHourChanged()">
      <option value="">-- Najpierw wybierz trasę --</option>
    </select>
  </div>

  <button id="showBtn" class="btn-submit" disabled onclick="renderSchedule()">POKAŻ HARMONOGRAM</button>

  <div id="schedule-container"></div>

  <div id="passwordModal" class="modal">
    <div class="modal-content">
      <h3>Panel Administratora</h3>
      <input type="password" id="adminPassword" placeholder="Wpisz hasło">
      <button class="btn-submit" style="margin: 10px 0 0 0;" onclick="checkPassword()">Zaloguj</button>
      <button class="btn-submit" style="background:#333; color:#fff; margin-top:5px;" onclick="closePasswordModal()">Anuluj</button>
    </div>
  </div>

  <script>
    let rawData = []; // Tutaj trafią dane z arkusza

    // 1. Pobranie danych na starcie za pomocą wbudowanego google.script.run
    document.addEventListener("DOMContentLoaded", function() {
      google.script.run
        .withSuccessHandler(function(data) {
          if (data.error) {
            alert("Błąd arkusza: " + data.error);
            return;
          }
          rawData = data;
          populateRoutes();
        })
        .withFailureHandler(function(err) {
          alert("Błąd połączenia: " + err);
        })
        .getSheetData(); // Wywołanie funkcji z Kod.gs
    });

    // Wypełnianie listy tras (Kolumna B / Indeks 1)
    function populateRoutes() {
      const routeSelect = document.getElementById("routeSelect");
      routeSelect.innerHTML = '<option value="">-- Wybierz trasę --</option>';
      
      let routes = [];
      // Omijamy nagłówek (i = 1)
      for (let i = 1; i < rawData.length; i++) {
        let routeName = rawData[i][1]; // Kolumna B
        if (routeName && !routes.includes(routeName)) {
          routes.push(routeName);
        }
      }

      routes.forEach(r => {
        let opt = document.createElement("option");
        opt.value = r;
        opt.textContent = r;
        routeSelect.appendChild(opt);
      });
    }

    // Wybór trasy odblokowuje godziny należące TYLKO do tej trasy
    function onRouteChanged() {
      const selectedRoute = document.getElementById("routeSelect").value;
      const hourSelect = document.getElementById("hourSelect");
      const showBtn = document.getElementById("showBtn");
      
      // Czyszczenie starego harmonogramu przy zmianie filtrów
      document.getElementById("schedule-container").innerHTML = "";
      showBtn.disabled = true;

      if (!selectedRoute) {
        hourSelect.innerHTML = '<option value="">-- Najpierw wybierz trasę --</option>';
        hourSelect.disabled = true;
        return;
      }

      hourSelect.innerHTML = '<option value="">-- Wybierz godzinę --</option>';
      hourSelect.disabled = false;

      let hours = [];
      for (let i = 1; i < rawData.length; i++) {
        if (rawData[i][1] === selectedRoute) {
          let hourVal = rawData[i][4]; // Kolumna E
          if (hourVal && !hours.includes(hourVal)) {
            hours.push(hourVal);
          }
        }
      }

      hours.forEach(h => {
        let opt = document.createElement("option");
        opt.value = h;
        opt.textContent = h;
        hourSelect.appendChild(opt);
      });
    }

    function onHourChanged() {
      const hourSelect = document.getElementById("hourSelect").value;
      document.getElementById("showBtn").disabled = !hourSelect;
    }

    // Generowanie harmonogramu dopiero PO kliknięciu przycisku
    function renderSchedule() {
      const selectedRoute = document.getElementById("routeSelect").value;
      const selectedHour = document.getElementById("hourSelect").value;
      const container = document.getElementById("schedule-container");
      
      container.innerHTML = "";

      // Filtrujemy dane po wybranej trasie I godzinie kursu
      for (let i = 1; i < rawData.length; i++) {
        if (rawData[i][1] === selectedRoute && rawData[i][4] === selectedHour) {
          const stopName = rawData[i][2]; // Kolumna C
          const stopTime = rawData[i][4]; // Kolumna E
          const mapUrl = rawData[i][3];   // Kolumna D

          const card = document.createElement("div");
          card.className = "stop-card";
          card.innerHTML = `
            <div class="stop-info">
              <span class="stop-name">${stopName}</span>
              <span class="stop-time">Odjazd: ${stopTime}</span>
            </div>
            ${mapUrl ? `<a href="${mapUrl}" target="_blank" class="map-link">Nawiguj</a>` : ''}
          `;
          container.appendChild(card);
        }
      }
    }

    // Obsługa funkcji Wake Lock (Żarówka niepozwalająca na wygaszenie)
    let wakeLock = null;
    async function toggleWakeLock() {
      const btn = document.getElementById("wakeLockBtn");
      if ('wakeLock' in navigator) {
        try {
          if (!wakeLock) {
            wakeLock = await navigator.wakeLock.request('screen');
            btn.className = "icon-btn wake-lock-on";
          } else {
            await wakeLock.release();
            wakeLock = null;
            btn.className = "icon-btn wake-lock-off";
          }
        } catch (err) {
          console.log("Wake Lock nie zadziałał: ", err.message);
        }
      } else {
        alert("Twoja przeglądarka nie wspługuje blokady wygaszania ekranu.");
      }
    }

    // Modal z hasłem
    function openPasswordModal() { document.getElementById("passwordModal").style.display = "flex"; }
    function closePasswordModal() { document.getElementById("passwordModal").style.display = "none"; }
    function checkPassword() {
      const pass = document.getElementById("adminPassword").value;
      google.script.run.withSuccessHandler(function(res) {
        if (res.success) {
          alert("Zalogowano pomyślnie! Tryb edycji gotowy.");
          closePasswordModal();
        } else {
          alert(res.message);
        }
      }).verifyPassword(pass);
    }
  </script>
</body>
</html>
