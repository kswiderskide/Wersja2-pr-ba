<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Kierowcy</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --accent-color: #ccff33;
            --text-color: #ffffff;
            --text-muted: #aaaaaa;
            --border-color: #333333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        /* NOWY UKŁAD NAGŁÓWKA */
        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #262626;
            padding: 12px 15px;
            border-bottom: 2px solid var(--border-color);
            position: relative;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        .header-left, .header-right {
            flex: 1;
            display: flex;
            align-items: center;
        }

        .header-right {
            justify-content: flex-end;
        }

        .header-center {
            flex: 2;
            text-align: center;
        }

        .header-center h1 {
            color: var(--text-color);
            font-size: 1.3rem;
            margin: 0;
            letter-spacing: 2px;
            font-weight: bold;
            text-transform: uppercase;
        }

        /* Przyciski w nagłówku */
        .header-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            border-radius: 4px;
            transition: all 0.3s ease;
        }

        .header-btn i {
            font-size: 1.3rem;
            transition: transform 0.2s ease;
        }

        .header-btn:active i {
            transform: scale(0.9);
        }

        /* Styl dla aktywnego czuwania ekranu (ON) - jaskrawa żarówka */
        .header-btn.active {
            color: var(--accent-color);
        }

        .header-btn.active #bulbIcon {
            font-weight: 900;
            filter: drop-shadow(0 0 5px var(--accent-color)) drop-shadow(0 0 10px var(--accent-color));
        }

        #wakeLockStatus {
            font-size: 0.75rem;
            font-weight: bold;
            font-family: 'Courier New', Courier, monospace;
            letter-spacing: 1px;
        }

        /* Reszta oryginalnych stylów Twojej aplikacji */
        .container {
            padding: 15px;
            max-width: 800px;
            margin: 0 auto;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid var(--border-color);
        }

        .route-title {
            color: var(--accent-color);
            font-size: 1.4rem;
            margin-top: 0;
            margin-bottom: 10px;
            text-transform: uppercase;
            font-weight: bold;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px 10px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
            font-size: 1.1rem;
        }

        th {
            color: var(--text-muted);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .current-stop {
            background-color: rgba(204, 255, 51, 0.15);
            color: var(--accent-color);
            font-weight: bold;
        }

        .next-stop {
            color: #ffffff;
        }

        .passed-stop {
            color: #555555;
            text-decoration: line-through;
        }

        .time-col {
            width: 70px;
            font-family: monospace;
            font-size: 1.2rem;
        }

        /* Ukryty panel edycji rozkładów (sterowany zębatką) */
        .admin-panel {
            display: none;
            background-color: var(--card-bg);
            border: 2px dashed var(--accent-color);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .admin-panel.open {
            display: block;
        }

        .admin-panel iframe {
            width: 100%;
            height: 400px;
            border: none;
            background: #ffffff;
            border-radius: 4px;
        }

        #loading {
            text-align: center;
            color: var(--accent-color);
            font-size: 1.2rem;
            margin-top: 50px;
        }
    </style>
</head>
<body>

    <header class="app-header">
        <div class="header-left">
            <button id="wakeLockBtn" onclick="toggleWakeLock()" class="header-btn">
                <i class="far fa-lightbulb" id="bulbIcon"></i>
                <span id="wakeLockStatus">EKRAN: OFF</span>
            </button>
        </div>

        <div class="header-center">
            <h1>Portal Kierowcy</h1>
        </div>

        <div class="header-right">
            <button id="adminBtn" onclick="toggleEditMode()" class="header-btn" title="Edycja tabeli i tras">
                <i class="fas fa-cog"></i>
            </button>
        </div>
    </header>

    <div class="container">
        <section id="adminPanel" class="admin-panel">
            <h3 style="color: var(--accent-color); margin-top: 0; display: flex; justify-content: space-between; align-items: center;">
                <span>🛠️ Panel Edycji Rozkładów i Tras</span>
                <button onclick="toggleEditMode()" style="background: var(--accent-color); border: none; padding: 5px 10px; cursor: pointer; font-weight: bold; border-radius: 4px;">Zamknij</button>
            </h3>
            <p style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 15px;">Poniżej możesz edytować godziny, przystanki oraz dodawać trasy bezpośrednio w arkuszu źródłowym:</p>
            <iframe src="https://docs.google.com/spreadsheets/d/140lW_72CWe6yI_4pM8bE-HymD1bC-e7S83Oenq8lOtc/edit?usp=sharing"></iframe>
        </section>

        <div id="loading">Pobieranie aktualnego rozkładu jazdy...</div>
        
        <div id="rozklad-kontener"></div>
    </div>

    <script>
        // TWÓJ ORYGINALNY ADRES URL DO ARKUSZA GOOGLE
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwL9cS6_hCokdTYd9L2OiA6WdHywGvyOFVd-rgde6MGYeHgKRSLaHLn3iXYaGwVCf-C/exec"; 

        let wakeLock = null;

        // 1. OBSŁUGA ŻARÓWKI (WAKE LOCK)
        async function toggleWakeLock() {
            const btn = document.getElementById('wakeLockBtn');
            const statusTxt = document.getElementById('wakeLockStatus');
            const bulbIcon = document.getElementById('bulbIcon');

            if (!wakeLock) {
                try {
                    wakeLock = await navigator.wakeLock.request('screen');
                    btn.classList.add('active');
                    statusTxt.innerText = 'EKRAN: ON';
                    bulbIcon.className = 'fas fa-lightbulb'; 
                    
                    wakeLock.addEventListener('release', () => {
                        wakeLock = null;
                        btn.classList.remove('active');
                        statusTxt.innerText = 'EKRAN: OFF';
                        bulbIcon.className = 'far fa-lightbulb';
                    });
                } catch (err) {
                    console.error(`Błąd blokady ekranu: ${err.message}`);
                }
            } else {
                await wakeLock.release();
                wakeLock = null;
                btn.classList.remove('active');
                statusTxt.innerText = 'EKRAN: OFF';
                bulbIcon.className = 'far fa-lightbulb';
            }
        }

        // 2. OBSŁUGA ZĘBATKI (PANEL ADMINISTRATORA)
        function toggleEditMode() {
            const adminPanel = document.getElementById('adminPanel');
            adminPanel.classList.toggle('open');
            
            const cog = document.querySelector('#adminBtn i');
            cog.style.transform = adminPanel.classList.contains('open') ? 'rotate(90deg)' : 'rotate(0deg)';
        }

        // Auto-przywracanie żarówki przy powrocie na kartę
        document.addEventListener('visibilitychange', async () => {
            if (wakeLock !== null && document.visibilityState === 'visible') {
                wakeLock = await navigator.wakeLock.request('screen');
            }
        });

        // 3. CAŁA TWOJA ORYGINALNA LOGIKA OPERACYJNA (POBIERANIE I GENEROWANIE DANYCH)
        async function zaciagnijDane() {
            try {
                const response = await fetch(SCRIPT_URL);
                const data = await response.json();
                
                // Zapisz do pamięci podręcznej (Cache) na wypadek braku internetu w trasie
                localStorage.setItem('cachedRozklad', JSON.stringify(data));
                localStorage.setItem('cachedRozkladTime', Date.now());
                
                renderujRozklad(data);
            } catch (error) {
                console.error("Błąd pobierania danych online, próba odczytu z pamięci podręcznej...", error);
                const cached = localStorage.getItem('cachedRozklad');
                if (cached) {
                    renderujRozklad(JSON.parse(cached));
                } else {
                    document.getElementById('loading').innerText = "Brak połączenia z siecią i brak zapisanych danych offline.";
                }
            }
        }

        function renderujRozklad(data) {
            const kontener = document.getElementById('rozklad-kontener');
            const loadingEl = document.getElementById('loading');
            if (loadingEl) loadingEl.style.display = 'none';
            kontener.innerHTML = '';

            if (!data || data.length === 0) {
                kontener.innerHTML = '<div class="card">Brak dostępnych tras w arkuszu.</div>';
                return;
            }

            // Grupowanie danych po nazwie trasy
            const trasy = {};
            data.forEach(wiersz => {
                if (!trasy[wiersz.trasa]) {
                    trasy[wiersz.trasa] = [];
                }
                trasy[wiersz.trasa].push(wiersz);
            });

            // Pobranie aktualnego czasu systemowego do oznaczania przystanków
            const teraz = new Date();
            const aktualneMinuty = teraz.getHours() * 60 + teraz.getMinutes();

            for (const nazwaTrasy in trasy) {
                const card = document.createElement('div');
                card.className = 'card';

                const title = document.createElement('h2');
                title.className = 'route-title';
                title.innerText = nazwaTrasy;
                card.appendChild(title);

                const table = document.createElement('table');
                table.innerHTML = `
                    <thead>
                        <tr>
                            <th class="time-col">Godz.</th>
                            <th>Przystanek</th>
                        </tr>
                    </thead>
                `;
                
                const tbody = document.createElement('tbody');
                let znalezionoBiezacy = false;

                // Sortowanie wierszy w trasie chronologicznie po godzinie
                trasy[nazwaTrasy].sort((a, b) => a.godzina.localeCompare(b.godzina));

                trasy[nazwaTrasy].forEach((wiersz, index, arr) => {
                    const tr = document.createElement('tr');
                    
                    const [godz, min] = wiersz.godzina.split(':').map(Number);
                    const minutRozkladu = godz * 60 + min;

                    // Określanie statusu przystanku na podstawie czasu
                    let stanKlasa = 'next-stop';
                    
                    if (minutRozkladu < aktualneMinuty) {
                        stanKlasa = 'passed-stop';
                    } else if (!znalezionoBiezacy && minutRozkladu >= aktualneMinuty) {
                        stanKlasa = 'current-stop';
                        znalezionoBiezacy = true;
                    }

                    tr.className = stanKlasa;
                    tr.innerHTML = `
                        <td class="time-col">${wiersz.godzina}</td>
                        <td>${wiersz.przystanek}</td>
                    `;
                    tbody.appendChild(tr);
                });

                table.appendChild(tbody);
                card.appendChild(table);
                kontener.appendChild(card);
            }
        }

        // Uruchomienie pobierania danych przy starcie aplikacji
        zaciagnijDane();
        
        // Automatyczne odświeżanie tabeli co 30 sekund, aby aktualizować podświetlenie przystanków
        setInterval(zaciagnijDane, 30000);
    </script>
</body>
</html>
