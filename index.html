<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Portal Kierowcy</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    * { -webkit-touch-callout: none; user-select: none; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #1a1a1a; color: #fff; margin: 0; height: 100vh; overflow: hidden; }
    .card { height: 100vh; width: 100vw; padding: 10px; position: relative; overflow-y: auto; }
    .wake-lock-container { position: absolute; top: 15px; left: 15px; cursor: pointer; color: #777; }
    .wake-lock-active { color: #ccff33 !important; }
    .btn-main { width: 100%; padding: 18px; margin: 5px 0; border-radius: 8px; font-weight: bold; cursor: pointer; border: none; background: #ccff33; color: #000; text-transform: uppercase; }
    select { width: 100%; padding: 18px; margin-bottom: 20px; border-radius: 8px; background: #eee; font-weight: bold; text-align-last: center; }
    #ui-view { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #262626; padding: 10px; flex-direction: column; }
    .view-table { width: 100%; border-collapse: collapse; }
    .view-table td { padding: 18px 8px; border-bottom: 1px solid #444; color: #fff; }
    .cell-time { text-align: center; font-weight: 900; color: #ccff33; width: 25%; }
  </style>
</head>
<body>

<div class="card">
  <div class="wake-lock-container" id="wakeLockBtn" onclick="toggleWakeLock()">
      <i id="bulb-icon" class="far fa-lightbulb" style="font-size: 26px;"></i>
      <div id="bulb-text" style="font-size: 10px;">OFF</div>
  </div>

  <div id="ui-select">
    <h2 style="text-align:center; color:#ccff33; margin: 60px 0 30px 0;">PORTAL KIEROWCY</h2>
    <select id="routeSelect"><option value="" disabled selected>WYBIERZ TRASĘ...</option></select>
    <button class="btn-main" onclick="showSchedule()">POKAŻ HARMONOGRAM</button>
  </div> 

  <div id="ui-view">
    <button onclick="document.getElementById('ui-view').style.display='none'" style="margin-bottom:10px; padding:10px;">WRÓĆ</button>
    <div id="table-output"></div>
  </div>
</div> 

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbwL9cS6_hCokdTYd9L2OiA6WdHywGvyOFVd-rgde6MGYeHgKRSLaHLn3iXYaGwVCf-C/exec";
  let db = [];

  // 1. Pobieranie danych z filtrowaniem pustych tras
  fetch(API_URL + "?t=" + new Date().getTime())
    .then(res => res.json())
    .then(data => {
      db = data;
      const rSel = document.getElementById('routeSelect');
      
      // Filtrujemy: bierzemy unikalne nazwy, odrzucamy puste i nagłówek "TRASA"
      const routes = [...new Set(data.map(r => r[0]))]
                    .filter(r => r && r !== "TRASA" && r.trim() !== "");
      
      routes.forEach(r => rSel.add(new Option(r, r)));
    });

  // 2. Poprawione wyświetlanie harmonogramu
  function showSchedule() {
    const r = document.getElementById('routeSelect').value;
    if(!r) return;
    
    let html = '<table class="view-table"><tbody>';
    
    // Szukamy wierszy dla wybranej trasy
    db.filter(row => row[0] === r).forEach(row => {
      // row[1] to nazwa przystanku, row[2] to godzina (dostosuj indeksy, jeśli są inne)
      html += `<tr>
                <td>${row[1]}</td>
                <td class="cell-time">${row[2] || '--'}</td>
               </tr>`;
    });
    
    document.getElementById('table-output').innerHTML = html + "</tbody></table>";
    document.getElementById('ui-view').style.display = "flex";
  }
</script>
</body>
</html>
