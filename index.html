<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal Kierowcy</title>
  <style>
    :root {
      --bg-color: #121212;
      --card-bg: #1e1e1e;
      --accent: #00ffcc;
      --text: #ffffff;
      --text-muted: #aaaaaa;
      --bulb-on: #ffcc00; 
      --bulb-off: #aaaaaa; 
    }
    body {
      background-color: var(--bg-color);
      color: var(--text);
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 15px;
    }
    
    .header-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 500px;
      margin: 0 auto 20px auto;
    }
    h1 {
      font-size: 18px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--accent);
      margin: 0;
      text-align: center;
      flex-grow: 1;
    }
    
    .icon-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 5px;
      display: flex;
      align-items: center;
      gap: 6px;
      font-weight: bold;
      -webkit-tap-highlight-color: transparent;
      outline: none;
    }
    .icon-btn:hover, .icon-btn:active, .icon-btn:focus {
      background: transparent !important;
      box-shadow: none !important;
      border: none !important;
    }
    
    /* Precyzyjne sterowanie stanem i rozświetleniem żarówki wektorowej SVG */
    .wake-lock-off svg {
      fill: var(--bulb-off) !important;
      filter: none !important;
    }
    .wake-lock-off .status-txt {
      color: var(--bulb-off) !important;
    }
    
    .wake-lock-on svg {
      fill: var(--bulb-on) !important;
      /* Super jaskrawy, neonowy efekt poświaty żarówki */
      filter: drop-shadow(0px 0px 8px var(--bulb-on)) drop-shadow(0px 0px 3px #ffffff) !important;
    }
    .wake-lock-on .status-txt {
      color: var(--bulb-on) !important;
    }
    
    .toolbox-icon { 
      color: var(--text-muted); 
      font-size: 22px;
    }

    .form-group {
      max-width: 500px;
      margin: 0 auto 15px auto;
    }
    label {
      display: block;
      margin-bottom: 5px;
      font-size: 14px;
      color: var(--text-muted);
    }
    select {
      width: 100%;
      padding: 12px;
      background-color: var(--card-bg);
      border: 1px solid #333;
      color: var(--text);
      border-radius: 6px;
      font-size: 16px;
    }
    .btn-submit {
      width: 100%;
      max-width: 500px;
      display: block;
      margin: 20px auto;
      padding: 14px;
      background-color: var(--accent);
      color: #000;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
    }
    .btn-submit:disabled {
      background-color: #333;
      color: #777;
      cursor: not-allowed;
    }

    .info-bar {
      max-width: 500px;
      margin: 0 auto 15px auto;
      background-color: #2a2a2a;
      padding: 12px;
      border-radius: 6px;
      text-align: center;
      font-size: 15px;
      border-bottom: 2px solid var(--accent);
    }
    .btn-back {
      width: 100%;
      max-width: 500px;
      display: block;
      margin: 0 auto 15px auto;
      padding: 12px;
      background-color: #333;
      color: #fff;
      border: 1px solid #555;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      font-size: 14px;
    }

    #schedule-container {
      max-width: 500px;
      margin: 20px auto;
    }
    .stop-card {
      background-color: var(--card-bg);
      border-left: 4px solid var(--accent);
      padding: 15px;
      margin-bottom: 10px;
      border-radius: 4px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .stop-info {
      display: flex;
      flex-direction: column;
    }
    .stop-name { font-size: 16px; font-weight: bold; }
    .stop-time { font-size: 14px; color: var(--accent); margin-top: 4px; }
    .map-link {
      background-color: #333;
      color: var(--accent);
      text-decoration: none;
      padding: 10px 16px;
      border-radius: 4px;
      font-size: 13px;
      font-weight: bold;
      border: 1px solid var(--accent);
    }

    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.8);
      justify-content: center;
      align-items: center;
      z-index: 999;
    }
    .modal-content {
      background: var(--card-bg);
      padding: 20px;
      border-radius: 8px;
      text-align: center;
      width: 80%;
      max-width: 300px;
    }
    .modal input {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
      background: #000;
      color: #fff;
      border: 1px solid #333;
    }
  </style>
</head>
<body>

  <div class="header-container">
    <button id="wakeLockBtn" class="icon-btn wake-lock-off" onclick="toggleWakeLock()">
      <svg width="22" height="22" viewBox="0 0 24 24" style="transition: all 0.3s ease;">
        <path d="M12 2C8.14 2 5 5.14 5 9c0 2.38 1.19 4.47 3 5.74V17c0 .55.45 1 1 1h6c.55 0 1-.45 1-1v-2.26c1.81-1.27 3-3.36 3-5.74 0-3.86-3.14-7-7-7zm2 19c0 .55-.45 1-1 1h-2c-.55 0-1-.45-1-1v-1h4v1zm-3-3h2v1h-2v-1z"/>
      </svg>
      <span class="status-txt" style="font-size: 11px; transition: color 0.3s ease;">EKRAN: <span id="wakeLockStatus">OFF</span></span>
    </button>
    <h1>Portal Kierowcy</h1>
    <button class="icon-btn toolbox-icon" onclick="openPasswordModal()">🧰</button>
  </div>

  <div id="filter-box">
    <div class="form-group">
      <label for="routeSelect">1. Wybierz trasę:</label>
      <select id="routeSelect" onchange="onRouteChanged()">
        <option value="">-- Ładowanie tras... --</option>
      </select>
    </div>

    <div class="form-group">
      <label for="hourSelect">2. Wybierz godzinę kursu:</label>
      <select id="hourSelect" disabled onchange="onHourChanged()">
        <option value="">-- Najpierw wybierz trasę --</option>
      </select>
    </div>

    <button id="showBtn" class="btn-submit" disabled onclick="showScheduleView()">POKAŻ HARMONOGRAM</button>
  </div>

  <div id="schedule-view" style="display: none;">
    <button class="btn-back" onclick="showFilterView()">← POWRÓT (ZMIEŃ KURS)</button>
    <div id="active-course-info" class="info-bar"></div>
    <div id="schedule-container"></div>
  </div>

  <div id="passwordModal" class="modal">
    <div class="modal-content">
      <h3>Panel Administratora</h3>
      <input type="password" id="adminPassword" placeholder="Wpisz hasło">
      <button class="btn-submit" style="margin: 10px 0 0 0;" onclick="checkPassword()">Zaloguj</button>
      <button class="btn-submit" style="background:#333; color:#fff; margin-top:5px;" onclick="closePasswordModal()">Anuluj</button>
    </div>
  </div>

  <script>
    // === PODPIĘTY I SPRAWDZONY LINK BEZPOŚREDNIO DO TWOJEGO SKRYPTU GAS ===
    const API_URL = "https://script.google.com/macros/s/AKfycbwL9cS6_hCokdTYd9L2OiA6WdHywGvyOFVd-rgde6MGYeHgKRSLaHLn3iXYaGwVCf-C/exec";

    let headers = [];
    let rawData = [];

    document.addEventListener("DOMContentLoaded", function() {
      fetch(API_URL)
        .then(response => response.json())
        .then(data => {
          if (data.error) {
            alert("Błąd bazy danych: " + data.error);
            return;
          }
          headers = data[0]; 
          rawData = data.slice(1); 
          populateRoutes();
        })
        .catch(err => {
          alert("Błąd połączenia sieciowego: " + err);
          console.error(err);
        });
    });

    function populateRoutes() {
      const routeSelect = document.getElementById("routeSelect");
      routeSelect.innerHTML = '<option value="">-- Wybierz trasę --</option>';
      
      let routes = [];
      rawData.forEach(row => {
        let routeName = row[0]; 
        if (routeName && !routes.includes(routeName)) {
          routes.push(routeName);
        }
      });

      routes.forEach(r => {
        let opt = document.createElement("option");
        opt.value = r;
        opt.textContent = r;
        routeSelect.appendChild(opt);
      });
    }

    function onRouteChanged() {
      const selectedRoute = document.getElementById("routeSelect").value;
      const hourSelect = document.getElementById("hourSelect");
      const showBtn = document.getElementById("showBtn");
      
      showBtn.disabled = true;

      if (!selectedRoute) {
        hourSelect.innerHTML = '<option value="">-- Najpierw wybierz trasę --</option>';
        hourSelect.disabled = true;
        return;
      }

      hourSelect.innerHTML = '<option value="">-- Wybierz godzinę --</option>';
      hourSelect.disabled = false;

      let activeHours = new Set();

      rawData.forEach(row => {
        if (row[0] === selectedRoute) {
          for (let colIdx = 4; colIdx < row.length; colIdx++) {
            let cellValue = row[colIdx];
            let hourHeader = headers[colIdx];
            if (cellValue && cellValue.trim() !== "" && cellValue.trim() !== "-" && hourHeader) {
              activeHours.add(hourHeader.trim());
            }
          }
        }
      });

      let sortedHours = Array.from(activeHours).sort();

      sortedHours.forEach(h => {
        let opt = document.createElement("option");
        opt.value = h;
        opt.textContent = h;
        hourSelect.appendChild(opt);
      });
    }

    function onHourChanged() {
      const hourSelect = document.getElementById("hourSelect").value;
      document.getElementById("showBtn").disabled = !hourSelect;
    }

    function showScheduleView() {
      const selectedRoute = document.getElementById("routeSelect").value;
      const FascynujacaGodzina = document.getElementById("hourSelect").value;
      
      document.getElementById("filter-box").style.display = "none";
      document.getElementById("schedule-view").style.display = "block";
      
      document.getElementById("active-course-info").innerHTML = `🚌 <b>${selectedRoute}</b> &nbsp;&nbsp;&nbsp; 🕒 Kurs: <b>${FascynujacaGodzina}</b>`;
      
      renderSchedule(selectedRoute, FascynujacaGodzina);
    }

    function showFilterView() {
      document.getElementById("schedule-view").style.display = "none";
      document.getElementById("filter-box").style.display = "block";
    }

    function renderSchedule(selectedRoute, selectedHour) {
      const container = document.getElementById("schedule-container");
      container.innerHTML = "";

      let hourColumnIndex = headers.findIndex(h => h && h.trim() === selectedHour.trim());

      if (hourColumnIndex === -1) {
        container.innerHTML = "<p style='color:red; text-align:center;'>Błąd: Nie znaleziono kolumny w bazie dla wybranego kursu.</p>";
        return;
      }

      rawData.forEach(row => {
        if (row[0] === selectedRoute) {
          let stopTime = row[hourColumnIndex];
          
          if (stopTime && stopTime.trim() !== "" && stopTime.trim() !== "-") {
            const stopName = row[1]; 
            let mapUrl = row[3];    
            const coords = row[2];  

            // NAPRAWIONE I ZABEZPIECZONE: Poprawna składnia szablonu template string ze znakiem $
            if ((!mapUrl || mapUrl.trim() === "") && coords && coords.trim() !== "") {
              mapUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(coords.trim())}`;
            }

            const card = document.createElement("div");
            card.className = "stop-card";
            card.innerHTML = `
              <div class="stop-info">
                <span class="stop-name">${stopName}</span>
                <span class="stop-time">Odjazd: ${stopTime}</span>
              </div>
              ${mapUrl ? `<a href="${mapUrl}" target="_blank" class="map-link">MAPA</a>` : ''}
            `;
            container.appendChild(card);
          }
        }
      });

      if (container.children.length === 0) {
        container.innerHTML = "<p style='text-align:center;'>Brak zdefiniowanych przystanków na tę godzinę.</p>";
      }
    }

    let wakeLock = null;
    async function toggleWakeLock() {
      const btn = document.getElementById("wakeLockBtn");
      const statusText = document.getElementById("wakeLockStatus");
      
      if ('wakeLock' in navigator) {
        try {
          if (!wakeLock) {
            wakeLock = await navigator.wakeLock.request('screen');
            btn.className = "icon-btn wake-lock-on"; 
            statusText.textContent = "ON";
          } else {
            await wakeLock.release();
            wakeLock = null;
            btn.className = "icon-btn wake-lock-off"; 
            statusText.textContent = "OFF";
          }
        } catch (err) {
          console.log("Wake Lock błąd: ", err.message);
        }
      } else {
        alert("Twoje urządzenie lub przeglądarka nie obsługują blokady wygaszania ekranu.");
      }
    }

    function openPasswordModal() { document.getElementById("passwordModal").style.display = "flex"; }
    function closePasswordModal() { document.getElementById("passwordModal").style.display = "none"; }
    
    function checkPassword() {
      const pass = document.getElementById("adminPassword").value;
      if (!pass) return;

      // NAPRAWIONE I ZABEZPIECZONE: Prawidłowe zastosowanie backticks dla dynamicznego linku URL
      fetch(`${API_URL}?action=verifyPassword&password=${encodeURIComponent(pass)}`)
        .then(res => res.json())
        .then(res => {
          if (res.success) {
            alert("Zalogowano pomyślnie! Tryb edycji bazy gotowy.");
            closePasswordModal();
          } else {
            alert(res.message || "Błędne hasło dostępu");
          }
        })
        .catch(err => alert("Błąd autoryzacji serwera: " + err));
    }
  </script>
</body>
</html>
