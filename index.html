<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal Kierowcy</title>
  <style>
    /* Twoje dotychczasowe style + dodatek dla panelu */
    :root { --bg-color: #121212; --card-bg: #1e1e1e; --accent: #00ffcc; --text: #ffffff; --text-muted: #aaaaaa; --danger: #ff4d4d; }
    body { background-color: var(--bg-color); color: var(--text); font-family: Arial, sans-serif; margin: 0; padding: 15px; }
    /* ... (reszta Twoich stylów) ... */
  </style>
</head>
<body>

  <div class="header-container">
    <button id="wakeLockBtn" class="icon-btn wake-lock-off" onclick="toggleWakeLock()">Żarówka</button>
    <h1>PORTAL KIEROWCY</h1>
    <button class="settings-btn" onclick="openPasswordModal()">⚙️</button>
  </div>

  <div id="adminPanel" style="display: none; max-width: 500px; margin: 20px auto; padding: 20px; background-color: var(--card-bg); border: 1px solid #333; border-radius: 6px;">
    <h2 style="color: var(--accent);">Panel Administratora</h2>
    <input type="text" id="routeLink" placeholder="http://googleusercontent.com/..." style="width: 100%; padding: 10px; box-sizing: border-box; background: #333; color: white;">
    <button onclick="convertShortLink()" style="width: 100%; padding: 10px; margin-top: 10px; background: var(--accent); border: none;">Pobierz współrzędne</button>
    <div id="adminLinkResult" style="margin-top: 10px; font-size: 14px;"></div>
  </div>

  <div id="passwordModal" style="display:none;">
    <input type="password" id="adminPassword">
    <button onclick="checkPassword()">Zaloguj</button>
  </div>

  <script>
    const API_URL = "TWÓJ_LINK_Z_GOOGLE_APPS_SCRIPT";

    // Uzupełnienie funkcji checkPassword
    function checkPassword() {
      const pass = document.getElementById("adminPassword").value;
      fetch(`${API_URL}?action=verifyPassword&password=${encodeURIComponent(pass)}`)
        .then(res => res.json())
        .then(res => {
          if (res.success) { 
            alert("Zalogowano!"); 
            closePasswordModal(); 
            document.getElementById("adminPanel").style.display = "block"; // Odsłonięcie panelu
          } else { alert(res.message); }
        });
    }

    // Nowa funkcja konwersji
    function convertShortLink() {
      const url = document.getElementById("routeLink").value;
      const resDiv = document.getElementById("adminLinkResult");
      fetch(`${API_URL}?action=resolveShortLink&url=${encodeURIComponent(url)}`)
        .then(res => res.json())
        .then(data => {
          if (data.success) {
            resDiv.innerHTML = `✅ Lat: ${data.lat}, Lng: ${data.lng}`;
          } else {
            resDiv.innerHTML = `❌ ${data.error}`;
          }
        });
    }
  </script>
</body>
</html>
