<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal Kierowcy</title>
  <style>
    :root { --bg-color: #121212; --card-bg: #1e1e1e; --accent: #00ffcc; --text: #ffffff; --text-muted: #aaaaaa; --danger: #ff4d4d; }
    body { background-color: var(--bg-color); color: var(--text); font-family: Arial, sans-serif; padding: 15px; }
    #adminPanel { display: none; max-width: 500px; margin: 20px auto; padding: 20px; background-color: var(--card-bg); border-radius: 6px; }
    .admin-input { width: 100%; padding: 12px; margin-top: 5px; background-color: #000; border: 1px solid #333; color: var(--accent); border-radius: 6px; box-sizing: border-box; font-family: monospace; }
    .btn-submit { width: 100%; padding: 14px; background-color: var(--accent); color: #000; border: none; border-radius: 6px; font-weight: bold; margin-top: 10px; cursor: pointer; }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 999; }
    .modal-content { background: var(--card-bg); padding: 20px; border-radius: 8px; text-align: center; width: 80%; max-width: 300px; }
    .modal input { width: 90%; padding: 10px; margin: 10px 0; background: #000; color: #fff; border: 1px solid #333; }
    .icon-btn { background: none; border: none; cursor: pointer; color: var(--text); font-size: 22px; }
    .header-container { display: flex; justify-content: space-between; align-items: center; max-width: 500px; margin: 0 auto; }
  </style>
</head>
<body>

<div id="adminPanel">
  <h3 style="color: var(--accent);">Panel Administratora</h3>
  <label>Wklej link mapy lub wpisz adres:</label>
  <input type="text" id="routeLink" class="admin-input" placeholder="np. https://goo.gl/maps/... lub Rynek 1, Sulechów">
  <button class="btn-submit" onclick="convertShortLink()">POBIERZ WSPÓŁRZĘDNE</button>
  <label style="margin-top: 15px;">Wynik (skopiuj go):</label>
  <input type="text" id="adminLinkResult" class="admin-input" readonly placeholder="Tutaj pojawią się liczby...">
  <button class="btn-submit" style="background:#333; color:#fff;" onclick="document.getElementById('adminPanel').style.display='none'">Zamknij</button>
</div>

<div class="header-container">
  <h1>Portal Kierowcy</h1>
  <button class="icon-btn" onclick="openPasswordModal()">🧰</button>
</div>

<div id="passwordModal" class="modal">
  <div class="modal-content">
    <h3>Logowanie Administratora</h3>
    <input type="password" id="adminPassword" placeholder="Hasło">
    <button class="btn-submit" onclick="checkPassword()">Zaloguj</button>
  </div>
</div>

<script>
  const API_URL = "TWÓJ_LINK_DO_GAS"; // PAMIĘTAJ O WPISANIU SWOJEGO LINKU

  function openPasswordModal() { document.getElementById("passwordModal").style.display = "flex"; }
  
  function checkPassword() {
    const pass = document.getElementById("adminPassword").value;
    fetch(`${API_URL}?action=verifyPassword&password=${encodeURIComponent(pass)}`)
      .then(res => res.json())
      .then(res => {
        if (res.success) {
          document.getElementById("passwordModal").style.display = "none";
          document.getElementById("adminPanel").style.display = "block";
        } else {
          alert("Błędne hasło");
        }
      });
  }

  function convertShortLink() {
    const url = document.getElementById("routeLink").value;
    const resInput = document.getElementById("adminLinkResult");
    resInput.value = "Przetwarzanie...";

    fetch(`${API_URL}?action=resolveShortLink&url=${encodeURIComponent(url)}`)
      .then(res => res.json())
      .then(data => {
        if (data.success) {
          resInput.value = data.result; // Same liczby: "51.xxxx, 15.xxxx"
        } else {
          resInput.value = "Błąd: " + data.error;
        }
      });
  }
</script>
</body>
</html>
